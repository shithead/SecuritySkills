name: Validate Index

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate index
        run: ruby scripts/validate_index.rb
